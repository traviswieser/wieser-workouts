// PROGRESS HELPERS
const Stats={
  getDates:(hist,pid)=>{const dates=[];Object.keys(hist).forEach(k=>{if(k.startsWith(pid+"-")){const p=k.split("-");const d=p.slice(3).join("-");if(d&&!dates.includes(d))dates.push(d);}});return dates.sort();},
  getWeek:(hist,pid)=>{const dates=Stats.getDates(hist,pid);if(!dates.length)return 0;const first=new Date(dates[0]);const now=new Date();return Math.min(Math.floor((now-first)/(7*864e5))+1,12);},
  getTotal:(hist,pid)=>Stats.getDates(hist,pid).length,
  getSessions:(hist,pid,phi,di)=>{const pre=`${pid}-${phi}-${di}-`;const s=[];Object.entries(hist).forEach(([k,v])=>{if(k.startsWith(pre))s.push({date:k.slice(pre.length),data:v});});return s.sort((a,b)=>a.date.localeCompare(b.date));},
  getExHistory:(hist,pid,exName)=>{const pts=[];Object.entries(hist).forEach(([k,v])=>{if(!k.startsWith(pid+"-"))return;const parts=k.split("-");const date=parts.slice(3).join("-");Object.values(v).forEach(ex=>{if(ex.name===exName&&ex.sets){let bW=0,bR=0,vol=0;ex.sets.forEach(s=>{const w=parseFloat(s.weight)||0;const r=parseFloat(s.reps)||0;if(w>bW){bW=w;bR=r;}vol+=w*r;});if(bW>0)pts.push({date,weight:bW,reps:bR,volume:vol,sets:ex.sets});}});});return pts.sort((a,b)=>a.date.localeCompare(b.date));},
  getLoggedExercises:(hist,pid)=>{const names=new Set();Object.entries(hist).forEach(([k,v])=>{if(!k.startsWith(pid+"-"))return;Object.values(v).forEach(ex=>{if(ex.name&&ex.sets&&ex.sets.some(s=>parseFloat(s.weight)>0))names.add(ex.name);});});return Array.from(names).sort();},
  getTotalMiles:(hist,pid,exName)=>{let total=0;Object.entries(hist).forEach(([k,v])=>{if(!k.startsWith(pid+"-"))return;Object.values(v).forEach(ex=>{if(ex.name===exName&&ex.sets){ex.sets.forEach(s=>{total+=parseFloat(s.reps)||0;});}});});return Math.round(total*10)/10;},
  getPR:(hist,pid,exName)=>{let best=0;Object.entries(hist).forEach(([k,v])=>{if(!k.startsWith(pid+"-"))return;Object.values(v).forEach(ex=>{if(ex.name===exName&&ex.sets){ex.sets.forEach(s=>{const w=parseFloat(s.weight)||0;if(w>best)best=w;});}});});return best;},
  fmtDate:(d)=>new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}),
  fmtDateFull:(d)=>new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}),
  getPctChange:(pts)=>{if(pts.length<2)return null;const f=pts[0].weight,l=pts[pts.length-1].weight;return f===0?null:Math.round(((l-f)/f)*100);}
};

// SVG LINE CHART
function MiniChart({points,width=340,height=180,unit="lbs",c}){const C=c||DARK;
  if(!points||!points.length)return<div style={{color:C.fnt,fontSize:13,padding:20,textAlign:"center"}}>No data yet — log some workouts first!</div>;
  const pad={t:20,r:16,b:36,l:44};const w=width-pad.l-pad.r;const h=height-pad.t-pad.b;
  const weights=points.map(p=>p.weight);const minW=Math.floor(Math.min(...weights)*0.9);const maxW=Math.ceil(Math.max(...weights)*1.05);const range=maxW-minW||1;
  const x=(i)=>pad.l+(points.length===1?w/2:(i/(points.length-1))*w);
  const y=(v)=>pad.t+h-((v-minW)/range)*h;
  const gridLines=[];for(let i=0;i<=4;i++){const val=minW+(range*i/4);gridLines.push({y:y(val),label:Math.round(val)});}
  const linePath=points.map((p,i)=>`${i===0?'M':'L'}${x(i)},${y(p.weight)}`).join(' ');
  const areaPath=linePath+` L${x(points.length-1)},${pad.t+h} L${x(0)},${pad.t+h} Z`;
  return(
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{display:"block",maxWidth:"100%"}}>
      <defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#FF6B2C" stopOpacity="0.3"/><stop offset="100%" stopColor="#FF6B2C" stopOpacity="0"/></linearGradient></defs>
      {gridLines.map((g,i)=>(<g key={i}><line x1={pad.l} y1={g.y} x2={width-pad.r} y2={g.y} stroke={C.bdr} strokeWidth="1"/><text x={pad.l-6} y={g.y+4} fill={C.fnt} fontSize="10" textAnchor="end" fontFamily="DM Sans">{g.label}</text></g>))}
      {points.map((p,i)=>{const skip=Math.max(1,Math.floor(points.length/6));if(i%skip!==0&&i!==points.length-1)return null;return<text key={i} x={x(i)} y={height-6} fill={C.fnt} fontSize="9" textAnchor="middle" fontFamily="DM Sans">{Stats.fmtDate(p.date)}</text>;})}
      <path d={areaPath} fill="url(#areaGrad)"/>
      <path d={linePath} fill="none" stroke="#FF6B2C" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {points.map((p,i)=>(<g key={i}><circle cx={x(i)} cy={y(p.weight)} r="4.5" fill="#FF6B2C" stroke="#08080A" strokeWidth="2"/><text x={x(i)} y={y(p.weight)-10} fill={C.txt} fontSize="10" fontWeight="600" textAnchor="middle" fontFamily="DM Sans">{p.weight}</text></g>))}
      <text x={4} y={pad.t-6} fill={C.fnt} fontSize="9" fontFamily="DM Sans">{unit}</text>
    </svg>
  );
}

  // AUTH
  const signIn=async()=>{setAuthError(null);try{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());}catch(e){if(e.code==='auth/popup-blocked'){try{await auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider());}catch(e2){setAuthError(e2.message);}}else if(e.code!=='auth/popup-closed-by-user'){setAuthError(e.message);}}};
  const emailSignIn=async()=>{setAuthError(null);if(!emailIn||!passIn)return setAuthError("Please enter email and password.");try{await auth.signInWithEmailAndPassword(emailIn,passIn);}catch(e){const msg=e.code==='auth/user-not-found'?"No account found with that email.":e.code==='auth/wrong-password'||e.code==='auth/invalid-credential'?"Incorrect password.":e.code==='auth/invalid-email'?"Invalid email address.":e.code==='auth/too-many-requests'?"Too many attempts. Try again later.":e.message;setAuthError(msg);}};
  const emailSignUp=async()=>{setAuthError(null);if(!emailIn||!passIn)return setAuthError("Please enter email and password.");if(passIn.length<6)return setAuthError("Password must be at least 6 characters.");try{await auth.createUserWithEmailAndPassword(emailIn,passIn);}catch(e){const msg=e.code==='auth/email-already-in-use'?"An account with that email already exists.":e.code==='auth/invalid-email'?"Invalid email address.":e.code==='auth/weak-password'?"Password is too weak. Use at least 6 characters.":e.message;setAuthError(msg);}};
  const resetPassword=async()=>{setAuthError(null);if(!emailIn)return setAuthError("Enter your email above, then tap Reset.");try{await auth.sendPasswordResetEmail(emailIn);setAuthError("Password reset email sent! Check your inbox.");}catch(e){const msg=e.code==='auth/user-not-found'?"No account found with that email.":e.code==='auth/invalid-email'?"Invalid email address.":e.message;setAuthError(msg);}};
  const signOut=async()=>{unsubs.current.forEach(fn=>fn());unsubs.current=[];await auth.signOut();setHist({});setSwaps({});setCustomEx({});setSsLinks({});setExOrder({});setExEdits({});setBodyWt({});setScreen("home");};

  const getPrev=useCallback(()=>{const pf=`${planId}-${phaseIdx}-${dayIdx}`;const ss=Object.entries(hist).filter(([k])=>k.startsWith(pf)).sort(([a],[b])=>b.localeCompare(a));if(ss.length>0&&ss[0][0]!==`${pf}-${today}`)return ss[0][1];if(ss.length>1)return ss[1][1];return null;},[hist,planId,phaseIdx,dayIdx,today]);
  const initLog=useCallback(()=>{const k=`${planId}-${phaseIdx}-${dayIdx}-${today}`;if(hist[k]){setLog(hist[k]);setWkNotes(hist[k]._notes||"");return;}const l={};getExs().forEach((e,i)=>{if(DURATION_EX.has(e.name)){l[i]={name:e.name,sets:[{weight:"",reps:""}]};}else{const n=parseInt(e.sets)||3;l[i]={name:e.name,sets:Array(Math.min(n,6)).fill(0).map(()=>({weight:"",reps:""}))};}});setLog(l);setWkNotes("");},[planId,phaseIdx,dayIdx,today,hist,getExs]);

  const filteredSessions=useMemo(()=>{if(progDay==="all"){const all=[];plan.phases.forEach((ph,pi)=>{ph.days.forEach((d,di)=>{Stats.getSessions(hist,planId,pi,di).forEach(s=>{all.push({...s,phase:pi,day:di,dayTitle:d.title,daySub:d.sub});});});});return all.sort((a,b)=>b.date.localeCompare(a.date));}else{const[pi,di]=progDay.split("-").map(Number);const d=plan.phases[pi]?.days[di];return Stats.getSessions(hist,planId,pi,di).map(s=>({...s,phase:pi,day:di,dayTitle:d?.title||"",daySub:d?.sub||""})).sort((a,b)=>b.date.localeCompare(a.date));}},[hist,planId,plan,progDay]);

        </div>
        {authError&&<div style={{marginTop:12,padding:"10px 14px",background:authError.includes("sent")?"#22C55E18":"#EF444418",border:authError.includes("sent")?"1px solid #22C55E30":"1px solid #EF444430",borderRadius:8,color:authError.includes("sent")?"#22C55E":"#EF4444",fontSize:12,textAlign:"left"}}>{authError}</div>}
        <div style={{marginTop:20,color:C.fnt,fontSize:12,lineHeight:1.6}}>Your workout data syncs securely.<br/>Only you can access your data.</div>
      </div>

  // MAIN RETURN

              </button>);})}
          </div>))}
      </div>)}

          <div style={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:12,padding:"14px 12px",textAlign:"center"}}><div style={{fontFamily:"Outfit",fontSize:24,fontWeight:800,color:C.grn}}>{totalSessions}</div><div style={{fontSize:10,color:C.fnt,fontWeight:600,marginTop:2}}>SESSIONS</div></div>
          <div style={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:12,padding:"14px 12px",textAlign:"center"}}><div style={{fontFamily:"Outfit",fontSize:24,fontWeight:800,color:"#5B8DEF"}}>{loggedExercises.length}</div><div style={{fontSize:10,color:C.fnt,fontWeight:600,marginTop:2}}>EXERCISES</div></div>

          <div style={{display:"grid",gridTemplateColumns:machines.length===1?"1fr":"1fr 1fr",gap:8,marginBottom:16}}>

                <div style={{fontFamily:"Outfit",fontSize:24,fontWeight:800,color:"#F59E0B"}}>{mi||"0"}</div>
                <div style={{fontSize:10,color:C.fnt,fontWeight:600,marginTop:2}}>{m.toUpperCase()} MILES</div>
              </div>);})}
          </div>);})()}

{/* BODY WEIGHT CHART */}
        {(()=>{const entries=Object.entries(bodyWt).filter(([k,v])=>v>0).sort(([a],[b])=>a.localeCompare(b));if(entries.length<2)return null;const pts=entries.map(([d,w])=>({date:d,weight:w}));return(
          <div style={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:14,padding:"16px",marginBottom:16}}>

                    {isDur?(
                      <div>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                          <span style={{fontSize:11,color:C.dim,fontWeight:700,letterSpacing:"0.5px"}}>LOG DURATION</span>
                          <button onClick={()=>clearEx(ei)} style={{background:C.srf,border:`1px solid #EF444425`,borderRadius:6,height:28,padding:"0 8px",color:"#EF4444",fontSize:11,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:3}}>✕ Clear</button>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <span style={{fontSize:13,color:C.fnt,fontWeight:600}}>🚴</span>
                          <input type="number" inputMode="numeric" placeholder="—" value={le?.sets?.[0]?.weight||""} onChange={e=>upd(ei,0,"weight",e.target.value)} style={{background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:8,padding:"10px 14px",color:C.txt,fontSize:18,fontWeight:700,textAlign:"center",outline:"none",height:48,width:100,boxSizing:"border-box"}}/>
                          <span style={{fontSize:14,color:C.dim,fontWeight:600}}>minutes</span>
                        </div>
                        {MILES_EX.has(exercise.name)&&(<div style={{display:"flex",alignItems:"center",gap:10,marginTop:8}}>
                          <span style={{fontSize:13,color:C.fnt,fontWeight:600}}>📍</span>
                          <input type="number" inputMode="decimal" step="0.1" placeholder="—" value={le?.sets?.[0]?.reps||""} onChange={e=>upd(ei,0,"reps",e.target.value)} style={{background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:8,padding:"10px 14px",color:C.txt,fontSize:18,fontWeight:700,textAlign:"center",outline:"none",height:48,width:100,boxSizing:"border-box"}}/>
                          <span style={{fontSize:14,color:C.dim,fontWeight:600}}>miles</span>
                        </div>)}
                      </div>
                    ):(
                      <div>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                          <span style={{fontSize:11,color:C.dim,fontWeight:700,letterSpacing:"0.5px"}}>LOG SETS</span>
                          <div style={{display:"flex",gap:4,alignItems:"center"}}>
                            <button onClick={()=>rmS(ei)} style={{background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:6,width:28,height:28,color:C.dim,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                            <button onClick={()=>addS(ei)} style={{background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:6,width:28,height:28,color:C.dim,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                            <button onClick={()=>clearEx(ei)} style={{background:C.srf,border:`1px solid #EF444425`,borderRadius:6,height:28,padding:"0 8px",color:"#EF4444",fontSize:11,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:3}}>✕ Clear</button>
                          </div>
                        </div>
                        <div style={{display:"grid",gridTemplateColumns:isRepsOnly?"32px 1fr":"32px 1fr 1fr",gap:5,marginBottom:4}}><span style={{fontSize:10,color:C.fnt,textAlign:"center"}}>SET</span>{!isRepsOnly&&<span style={{fontSize:10,color:C.fnt,textAlign:"center"}}>LBS</span>}<span style={{fontSize:10,color:C.fnt,textAlign:"center"}}>{isRepsOnly?"TIME/REPS":"REPS"}</span></div>
                        {le?.sets?.map((set,si)=>(
                          <div key={si} style={{display:"grid",gridTemplateColumns:isRepsOnly?"32px 1fr":"32px 1fr 1fr",gap:5,marginBottom:4}}>
                            <div style={{display:"flex",alignItems:"center",justifyContent:"center",background:C.srf,borderRadius:6,fontSize:12,fontWeight:700,color:C.fnt,height:40}}>{si+1}</div>
                            {!isRepsOnly&&<input type="number" inputMode="decimal" placeholder="—" value={set.weight} onChange={e=>upd(ei,si,"weight",e.target.value)} style={{background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:8,padding:"8px",color:C.txt,fontSize:15,fontWeight:600,textAlign:"center",outline:"none",height:40,width:"100%",boxSizing:"border-box"}}/>}
                            <input type="number" inputMode="numeric" placeholder="—" value={isRepsOnly?(set.weight||""):set.reps} onChange={e=>upd(ei,si,isRepsOnly?"weight":"reps",e.target.value)} style={{background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:8,padding:"8px",color:C.txt,fontSize:15,fontWeight:600,textAlign:"center",outline:"none",height:40,width:"100%",boxSizing:"border-box"}}/>
                          </div>))}
                      </div>
                    )}
                  </div>
                </div>)}
            </div>
            </div>);})}

        {/* WORKOUT NOTES */}
        <div style={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:12,padding:"14px 16px",marginTop:8,marginBottom:4}}>
          <div style={{fontSize:11,color:"#A78BFA",fontWeight:700,letterSpacing:"0.5px",marginBottom:8}}>WORKOUT NOTES</div>
          <textarea placeholder="How did the workout feel? Any difficulties or things to remember..." value={wkNotes} onChange={e=>{setWkNotes(e.target.value);setSaved(false);}} style={{width:"100%",minHeight:70,background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:8,padding:"10px 12px",color:C.txt,fontSize:13,outline:"none",resize:"vertical",boxSizing:"border-box",fontFamily:"inherit",lineHeight:1.5}}/>
        </div>

        {/* ADD EXERCISE BUTTON */}
        {!addExForm&&(<button onClick={()=>setAddExForm(true)} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,width:"100%",padding:"12px",background:C.card,border:`1px dashed ${C.sbdr}`,borderRadius:12,color:C.dim,fontSize:13,fontWeight:600,cursor:"pointer",marginTop:4}}>+ Add Exercise</button>)}

        {/* ADD EXERCISE FORM */}
        {addExForm&&(
          <div style={{background:C.card,border:`1px solid ${C.acc}44`,borderRadius:12,padding:16,marginTop:4}}>
            <div style={{fontSize:11,color:C.acc,fontWeight:700,letterSpacing:"0.5px",marginBottom:10}}>➕ ADD CUSTOM EXERCISE</div>
            <input type="text" placeholder="Exercise name" value={addExName} onChange={e=>setAddExName(e.target.value)} style={{width:"100%",background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:8,padding:"10px 12px",color:C.txt,fontSize:14,outline:"none",marginBottom:8,boxSizing:"border-box",fontFamily:"inherit"}}/>
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <select value={addExGroup} onChange={e=>setAddExGroup(e.target.value)} style={{flex:1}}>{Object.keys(SWAP_POOLS).map(g=><option key={g} value={g}>{g.charAt(0).toUpperCase()+g.slice(1)}</option>)}</select>
              <select value={addExSets} onChange={e=>setAddExSets(e.target.value)} style={{width:80}}><option value="2">2 sets</option><option value="3">3 sets</option><option value="4">4 sets</option><option value="5">5 sets</option></select>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={addExercise} style={{flex:1,padding:"10px",borderRadius:8,border:"none",background:C.acc,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>Add</button>
              <button onClick={()=>{setAddExForm(null);setAddExName("");}} style={{padding:"10px 16px",borderRadius:8,border:`1px solid ${C.sbdr}`,background:C.srf,color:C.dim,fontWeight:600,fontSize:13,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>)}

      </div>)}
    </div>

    {/* PR TOAST */}
    {prToast&&(<div style={{position:"fixed",top:70,left:"50%",transform:"translateX(-50%)",zIndex:99,background:"linear-gradient(135deg,#F59E0B,#D97706)",borderRadius:12,padding:"12px 20px",boxShadow:"0 8px 32px rgba(245,158,11,.4)",animation:"fadeIn 0.3s",maxWidth:340}}>
      <div style={{fontWeight:800,fontSize:14,color:"#fff",marginBottom:4}}>🏆 New Personal Record{prToast.length>1?"s":""}!</div>
      {prToast.map((pr,i)=>(<div key={i} style={{fontSize:12,color:"#fff",opacity:0.95}}>{pr.name}: {pr.weight} lbs</div>))}
    </div>)}

    {/* REST TIMER */}
    {restRunning&&restSec>0&&screen==="workout"&&(
      <div onClick={()=>{setRestRunning(false);setRestSec(0);}} style={{position:"fixed",bottom:screen==="workout"?140:80,left:"50%",transform:"translateX(-50%)",zIndex:55,background:restSec<=10?"linear-gradient(135deg,#EF4444,#DC2626)":"linear-gradient(135deg,#1E293B,#0F172A)",border:`2px solid ${restSec<=10?"#EF444460":"#5B8DEF40"}`,borderRadius:50,padding:"10px 24px",boxShadow:"0 8px 32px rgba(0,0,0,.5)",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:13,color:restSec<=10?"#fff":"#5B8DEF",fontWeight:700}}>⏳ Rest</span>
        <span style={{fontFamily:"Outfit",fontSize:22,fontWeight:800,color:"#fff"}}>{Math.floor(restSec/60)}:{(restSec%60)<10?"0":""}{restSec%60}</span>
        <span style={{fontSize:10,color:"#ffffff80"}}>tap to dismiss</span>
      </div>)}

    {/* SAVE BUTTON + DELETE SESSION */}
    {screen==="workout"&&(
      <div style={{position:"fixed",bottom:0,left:0,right:0,padding:"12px 16px 24px",background:`linear-gradient(180deg,transparent,${C.bg} 40%)`,zIndex:40}}>
        <div style={{maxWidth:600,margin:"0 auto"}}>
          <button onClick={save} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",fontWeight:700,fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"all .3s",background:saved?"linear-gradient(135deg,#16A34A,#15803D)":`linear-gradient(135deg,${C.acc},#E85D1A)`,color:"#fff",boxShadow:saved?"0 4px 24px rgba(34,197,94,.3)":"0 4px 24px rgba(255,107,44,.3)"}}>
            {saved?<><Check/> Saved{elapsed>0?" · "+fmtElapsed(elapsed):""}</>:syncing?<><span className="syncing">Syncing...</span></>:<><DBIcon s={18}/> Save Workout</>}
          </button>
          {hist[`${planId}-${phaseIdx}-${dayIdx}-${today}`]&&!delConfirm&&(
            <button onClick={()=>setDelConfirm(true)} style={{width:"100%",marginTop:6,padding:"10px",borderRadius:8,border:`1px solid #EF444425`,background:"transparent",color:"#EF4444",fontSize:12,fontWeight:600,cursor:"pointer"}}>Delete Today's Session</button>
          )}
          {delConfirm&&(
            <div style={{marginTop:6,background:"#EF444412",border:"1px solid #EF444430",borderRadius:10,padding:12,textAlign:"center"}}>
              <div style={{fontSize:12,color:"#EF4444",marginBottom:8}}>Delete all logged data for today's workout?</div>
              <div style={{display:"flex",gap:8,justifyContent:"center"}}>
                <button onClick={deleteSession} style={{padding:"8px 20px",borderRadius:8,border:"none",background:"#EF4444",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>Yes, Delete</button>
                <button onClick={()=>setDelConfirm(false)} style={{padding:"8px 20px",borderRadius:8,border:`1px solid ${C.sbdr}`,background:C.srf,color:C.dim,fontWeight:600,fontSize:12,cursor:"pointer"}}>Cancel</button>
              </div>
            </div>
          )}
        </div>
      </div>)}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
