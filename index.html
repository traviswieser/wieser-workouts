const getExForEquip=(group,equipKeys)=>{const pool=EX_BY_EQUIP[group]||{};const exs=new Set();equipKeys.forEach(k=>{(pool[k]||[]).forEach(e=>exs.add(e));});return[...exs];};
const pickExs=(group,equipKeys,count=2)=>{
  const pool=EX_BY_EQUIP[group]||{};
  const buckets=equipKeys.map(k=>[...(pool[k]||[])]).filter(b=>b.length>0);
  if(buckets.length===0)return[];
  const result=[];const used=new Set();let bi=0;
  while(result.length<count){
    let found=false;
    for(let attempt=0;attempt<buckets.length;attempt++){
      const bucket=buckets[(bi+attempt)%buckets.length];
      const ex=bucket.find(e=>!used.has(e));
      if(ex){result.push(ex);used.add(ex);bi=(bi+attempt+1)%buckets.length;found=true;break;}
    }
    if(!found)break;
  }
  return result;
};

// PROGRESS HELPERS
const Stats={
  getDates:(hist,pid)=>{const dates=[];Object.keys(hist).forEach(k=>{if(k.startsWith(pid+"-")){const p=k.split("-");const d=p.slice(3).join("-");if(d&&!dates.includes(d))dates.push(d);}});return dates.sort();},
  getWeek:(hist,pid)=>{const dates=Stats.getDates(hist,pid);if(!dates.length)return 0;const first=new Date(dates[0]);const now=new Date();return Math.min(Math.floor((now-first)/(7*864e5))+1,12);},
  getTotal:(hist,pid)=>Stats.getDates(hist,pid).length,
  getSessions:(hist,pid,phi,di)=>{const pre=`${pid}-${phi}-${di}-`;const s=[];Object.entries(hist).forEach(([k,v])=>{if(k.startsWith(pre))s.push({date:k.slice(pre.length),data:v});});return s.sort((a,b)=>a.date.localeCompare(b.date));},
  getExHistory:(hist,pid,exName)=>{const pts=[];Object.entries(hist).forEach(([k,v])=>{if(!k.startsWith(pid+"-"))return;const parts=k.split("-");const date=parts.slice(3).join("-");Object.values(v).forEach(ex=>{if(ex.name===exName&&ex.sets){let bW=0,bR=0,vol=0;ex.sets.forEach(s=>{const w=parseFloat(s.weight)||0;const r=parseFloat(s.reps)||0;if(w>bW){bW=w;bR=r;}vol+=w*r;});if(bW>0)pts.push({date,weight:bW,reps:bR,volume:vol,sets:ex.sets});}});});return pts.sort((a,b)=>a.date.localeCompare(b.date));},
  getLoggedExercises:(hist,pid)=>{const names=new Set();Object.entries(hist).forEach(([k,v])=>{if(!k.startsWith(pid+"-"))return;Object.values(v).forEach(ex=>{if(ex.name&&ex.sets&&ex.sets.some(s=>parseFloat(s.weight)>0))names.add(ex.name);});});return Array.from(names).sort();},
  getTotalMiles:(hist,pid,exName)=>{let total=0;Object.entries(hist).forEach(([k,v])=>{if(!k.startsWith(pid+"-"))return;Object.values(v).forEach(ex=>{if(ex.name===exName&&ex.sets){ex.sets.forEach(s=>{total+=parseFloat(s.reps)||0;});}});});return Math.round(total*10)/10;},
  getPR:(hist,pid,exName)=>{let best=0;Object.entries(hist).forEach(([k,v])=>{if(!k.startsWith(pid+"-"))return;Object.values(v).forEach(ex=>{if(ex.name===exName&&ex.sets){ex.sets.forEach(s=>{const w=parseFloat(s.weight)||0;if(w>best)best=w;});}});});return best;},
  fmtDate:(d)=>new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}),
  fmtDateFull:(d)=>new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}),
  getPctChange:(pts)=>{if(pts.length<2)return null;const f=pts[0].weight,l=pts[pts.length-1].weight;return f===0?null:Math.round(((l-f)/f)*100);}
};

// SVG LINE CHART
function MiniChart({points,width=340,height=180,unit="lbs",c}){const C=c||DARK;
  if(!points||!points.length)return<div style={{color:C.fnt,fontSize:13,padding:20,textAlign:"center"}}>No data yet — log some workouts first!</div>;
  const pad={t:20,r:16,b:36,l:44};const w=width-pad.l-pad.r;const h=height-pad.t-pad.b;
  const weights=points.map(p=>p.weight);const minW=Math.floor(Math.min(...weights)*0.9);const maxW=Math.ceil(Math.max(...weights)*1.05);const range=maxW-minW||1;
  const x=(i)=>pad.l+(points.length===1?w/2:(i/(points.length-1))*w);
  const y=(v)=>pad.t+h-((v-minW)/range)*h;
  const gridLines=[];for(let i=0;i<=4;i++){const val=minW+(range*i/4);gridLines.push({y:y(val),label:Math.round(val)});}
  const linePath=points.map((p,i)=>`${i===0?'M':'L'}${x(i)},${y(p.weight)}`).join(' ');
  const areaPath=linePath+` L${x(points.length-1)},${pad.t+h} L${x(0)},${pad.t+h} Z`;
  return(
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{display:"block",maxWidth:"100%"}}>
      <defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#FF6B2C" stopOpacity="0.3"/><stop offset="100%" stopColor="#FF6B2C" stopOpacity="0"/></linearGradient></defs>
      {gridLines.map((g,i)=>(<g key={i}><line x1={pad.l} y1={g.y} x2={width-pad.r} y2={g.y} stroke={C.bdr} strokeWidth="1"/><text x={pad.l-6} y={g.y+4} fill={C.fnt} fontSize="10" textAnchor="end" fontFamily="DM Sans">{g.label}</text></g>))}
      {points.map((p,i)=>{const skip=Math.max(1,Math.floor(points.length/6));if(i%skip!==0&&i!==points.length-1)return null;return<text key={i} x={x(i)} y={height-6} fill={C.fnt} fontSize="9" textAnchor="middle" fontFamily="DM Sans">{Stats.fmtDate(p.date)}</text>;})}
      <path d={areaPath} fill="url(#areaGrad)"/>
      <path d={linePath} fill="none" stroke="#FF6B2C" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {points.map((p,i)=>(<g key={i}><circle cx={x(i)} cy={y(p.weight)} r="4.5" fill="#FF6B2C" stroke="#08080A" strokeWidth="2"/><text x={x(i)} y={y(p.weight)-10} fill={C.txt} fontSize="10" fontWeight="600" textAnchor="middle" fontFamily="DM Sans">{p.weight}</text></g>))}
      <text x={4} y={pad.t-6} fill={C.fnt} fontSize="9" fontFamily="DM Sans">{unit}</text>
    </svg>
  );
}

        </div>
        {authError&&<div style={{marginTop:12,padding:"10px 14px",background:authError.includes("sent")?"#22C55E18":"#EF444418",border:authError.includes("sent")?"1px solid #22C55E30":"1px solid #EF444430",borderRadius:8,color:authError.includes("sent")?"#22C55E":"#EF4444",fontSize:12,textAlign:"left"}}>{authError}</div>}
        <div style={{marginTop:20,color:C.fnt,fontSize:12,lineHeight:1.6}}>Your workout data syncs securely.<br/>Only you can access your data.</div>
        <div style={{marginTop:16,background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:10,padding:"12px 14px",textAlign:"left"}}>
          <div style={{fontSize:12,fontWeight:700,color:C.txt,marginBottom:6}}>📲 Install as an App</div>
          <div style={{fontSize:11,color:C.dim,lineHeight:1.7,marginBottom:6}}><b style={{color:C.txt}}>Android:</b> Tap the menu (⋮) in Chrome → "Add to Home screen" or "Install app"</div>

          <div style={{fontSize:11,color:C.fnt,lineHeight:1.5}}>This gives you a full-screen app experience with an icon on your home screen.</div>
        </div>

  // MAIN RETURN
  return(
  <div style={{background:C.bg,minHeight:"100vh",color:C.txt,paddingBottom:screen==="workout"?"130px":"0"}}>
    {/* HEADER */}
    <div style={{background:`linear-gradient(180deg,${C.card},${C.bg})`,borderBottom:`1px solid ${C.bdr}`,padding:"12px 16px",position:"sticky",top:0,zIndex:50}}>

        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {screen!=="home"&&<button onClick={()=>{history.back();}} style={{background:"none",border:"none",color:C.acc,fontSize:14,fontWeight:600,cursor:"pointer"}}>← Back</button>}
          <div style={{fontFamily:"Outfit",fontWeight:800,fontSize:18,letterSpacing:"-0.5px",display:"flex",alignItems:"center",gap:6}}><DBIcon s={20}/><span style={{color:C.acc}}>WIESER</span><span> WORKOUTS</span></div>
        </div>

            <button onClick={()=>setPlanMenu(!planMenu)} style={{background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:8,padding:"6px 12px",color:C.dim,fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>{plan.id.toUpperCase()} <Chev up={planMenu} s={14}/></button>

                <button onClick={()=>{setPlanMenu(false);setCpScreen("main");setCpDraft(null);setAiError("");setScreen("create");history.pushState({screen:"create"},"");}} style={{display:"block",width:"100%",textAlign:"left",padding:"12px 16px",background:"transparent",border:"none",borderTop:`1px solid ${C.acc}30`,color:C.acc,cursor:"pointer",fontWeight:700,fontSize:13}}>✨ Create New Plan</button>

                  <div style={{display:"flex",alignItems:"center",gap:8}}>{user.photoURL&&<img src={user.photoURL} style={{width:24,height:24,borderRadius:12}} referrerPolicy="no-referrer"/>}<span style={{fontSize:11,color:C.dim,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.displayName||user.email}</span></div>

                </div>
              </div>)}
          </div>
        </div>
      </div>

    <div style={{maxWidth:600,margin:"0 auto"}}>

    {screen==="create"&&(

          <div style={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:12,padding:16,marginBottom:16}}>
            <div style={{fontSize:11,color:"#22C55E",fontWeight:700,letterSpacing:"0.5px",marginBottom:10}}>AVAILABLE EQUIPMENT</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {EQUIPMENT.map(eq=>(<button key={eq.key} onClick={()=>{setCpEquip(prev=>prev.includes(eq.key)?prev.filter(k=>k!==eq.key):[...prev,eq.key]);}} style={{padding:"6px 10px",borderRadius:8,border:`1px solid ${cpEquip.includes(eq.key)?C.acc+"60":C.sbdr}`,background:cpEquip.includes(eq.key)?C.acc+"15":"transparent",color:cpEquip.includes(eq.key)?C.acc:C.dim,fontSize:11,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}><span>{eq.icon}</span>{eq.label}</button>))}

            <textarea placeholder='Example: "4-day upper/lower split for intermediate lifters. Focus on strength with 5x5 compounds and hypertrophy accessories. Include 2 rest days."' value={aiPrompt} onChange={e=>setAiPrompt(e.target.value)} style={{width:"100%",minHeight:80,background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:8,padding:"10px 12px",color:C.txt,fontSize:13,outline:"none",resize:"vertical",boxSizing:"border-box",fontFamily:"inherit",lineHeight:1.5}}/>
            <button onClick={()=>generateAIPlan(aiPrompt+"\nAvailable equipment: "+cpEquip.map(k=>{const e=EQUIPMENT.find(eq=>eq.key===k);return e?e.label:k;}).join(", ")+". Only use exercises possible with this equipment.")} disabled={aiLoading||!aiPrompt.trim()} style={{width:"100%",marginTop:8,padding:"12px",borderRadius:10,border:"none",background:aiLoading?"#555":`linear-gradient(135deg,#A78BFA,#7C3AED)`,color:"#fff",fontSize:14,fontWeight:700,cursor:aiLoading?"wait":"pointer",opacity:(!aiPrompt.trim()&&!aiLoading)?0.5:1}}>{aiLoading?"Generating...":"✨ Generate with AI"}</button>
          </div>

          <div style={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:12,padding:16,marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:700,color:C.txt,marginBottom:8}}>Import an existing workout plan</div>
            <input ref={fileRef} type="file" accept="image/*,.pdf,.txt,.csv" onChange={handleFile} style={{display:"none"}}/>
            <button onClick={()=>fileRef.current?.click()} style={{width:"100%",padding:"14px",borderRadius:10,border:`2px dashed ${aiFileData?C.acc+"60":C.sbdr}`,background:aiFileData?C.acc+"08":"transparent",color:aiFileData?C.acc:C.dim,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:8,transition:"all 0.2s"}}>{aiFileData?("✅ "+aiFileName):("📷 Upload Image, PDF, or Text File")}</button>
            <textarea placeholder="Or paste your workout plan as text here. You can also add notes alongside an uploaded file." value={aiPaste} onChange={e=>setAiPaste(e.target.value)} style={{width:"100%",minHeight:70,background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:8,padding:"10px 12px",color:C.txt,fontSize:13,outline:"none",resize:"vertical",boxSizing:"border-box",fontFamily:"inherit",lineHeight:1.5}}/>
            <div style={{display:"flex",gap:8,marginTop:8}}>
              {aiFileData&&<button onClick={()=>generateWithFile()} disabled={aiLoading} style={{flex:1,padding:"12px",borderRadius:10,border:"none",background:aiLoading?"#555":`linear-gradient(135deg,#F59E0B,#D97706)`,color:"#fff",fontSize:14,fontWeight:700,cursor:aiLoading?"wait":"pointer"}}>{aiLoading?"Converting...":"📷 Convert File with AI"}</button>}
              <button onClick={()=>generateAIPlan("Convert this workout plan into the EXACT JSON format. You MUST keep every exercise name, set count, and rep scheme EXACTLY as written — do NOT substitute, rename, reorder, or add exercises. Only organize into the JSON structure:\n\n"+aiPaste)} disabled={aiLoading||!aiPaste.trim()} style={{flex:1,padding:"12px",borderRadius:10,border:"none",background:aiLoading?"#555":aiFileData?C.srf:`linear-gradient(135deg,#F59E0B,#D97706)`,color:aiFileData?C.dim:"#fff",fontSize:14,fontWeight:700,cursor:aiLoading?"wait":"pointer",opacity:(!aiPaste.trim()&&!aiLoading)?0.5:1}}>{aiLoading?"Converting...":"📋 Convert Text with AI"}</button>

          <div style={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:12,padding:16}}>

            <div style={{marginTop:10,padding:"10px 12px",background:C.srf,borderRadius:8,fontSize:11,color:C.dim,lineHeight:1.7}}>

              {aiProvider==="openai"&&<><b style={{color:C.txt}}>How to get an OpenAI key:</b><br/>1. Go to <a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener" style={{color:C.acc}}>platform.openai.com/api-keys</a><br/>2. Sign in or create an account<br/>3. Click "Create new secret key"<br/>4. Copy the key (starts with <b>sk-</b>) and paste it above<br/>Note: Requires adding a payment method. Generating a plan costs ~$0.02–0.05.</>}
              {aiProvider==="claude"&&<><b style={{color:C.txt}}>How to get a Claude key:</b><br/>1. Go to <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener" style={{color:C.acc}}>console.anthropic.com/settings/keys</a><br/>2. Sign in or create an account<br/>3. Click "Create Key"<br/>4. Copy the key (starts with <b>sk-ant-</b>) and paste it above<br/>Note: Requires adding billing credits. Generating a plan costs ~$0.02–0.05.</>}
              {aiProvider==="gemini"&&<><b style={{color:C.txt}}>How to get a Gemini key:</b><br/>1. Go to <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener" style={{color:C.acc}}>aistudio.google.com/apikey</a><br/>2. Sign in with your Google account<br/>3. Click "Create API key"<br/>4. Copy the key (starts with <b>AIza</b>) and paste it above<br/>Note: Google now requires billing for most API usage. If you get a quota error, you may need to enable billing at <a href="https://console.cloud.google.com/billing" target="_blank" rel="noopener" style={{color:C.acc}}>console.cloud.google.com/billing</a>. OpenAI is recommended as the most reliable option.</>}
            </div>
          </div>
        </>)}

        {cpScreen==="edit"&&cpDraft&&(<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontFamily:"Outfit",fontSize:20,fontWeight:800}}>Edit Plan</div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{setCpScreen("main");setCpDraft(null);}} style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${C.sbdr}`,background:C.srf,color:C.dim,fontSize:12,fontWeight:600,cursor:"pointer"}}>Cancel</button>
              <button onClick={()=>publishPlan(cpDraft)} style={{padding:"6px 16px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${C.acc},#E85D1A)`,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>Publish ✓</button>
            </div>
          </div>

          <div style={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:12,padding:16,marginBottom:12}}>

            <input value={cpDraft.name} onChange={e=>setCpDraft({...cpDraft,name:e.target.value})} style={{width:"100%",background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:8,padding:"10px 12px",color:C.txt,fontSize:15,fontWeight:700,outline:"none",boxSizing:"border-box",fontFamily:"inherit",marginBottom:8}}/>
            <div style={{fontSize:10,color:C.fnt,fontWeight:700,marginBottom:6}}>SUBTITLE</div>
            <input value={cpDraft.subtitle} onChange={e=>setCpDraft({...cpDraft,subtitle:e.target.value})} style={{width:"100%",background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:8,padding:"10px 12px",color:C.txt,fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
          </div>

          {cpDraft.phases?.map((ph,pi)=>(
            <div key={pi} style={{marginBottom:12}}>

                    <input value={dy.title} onChange={e=>{const np=[...cpDraft.phases];np[pi].days[di]={...dy,title:e.target.value};setCpDraft({...cpDraft,phases:np});}} style={{background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:6,padding:"6px 10px",color:C.txt,fontSize:13,fontWeight:700,outline:"none",width:80,fontFamily:"inherit"}}/>

            <input type="text" placeholder="Exercise name" value={addExName} onChange={e=>setAddExName(e.target.value)} style={{width:"100%",background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:8,padding:"10px 12px",color:C.txt,fontSize:14,outline:"none",marginBottom:8,boxSizing:"border-box",fontFamily:"inherit"}}/>
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <select value={addExGroup} onChange={e=>setAddExGroup(e.target.value)} style={{flex:1}}>{Object.keys(SWAP_POOLS).map(g=><option key={g} value={g}>{g.charAt(0).toUpperCase()+g.slice(1)}</option>)}</select>
              <select value={addExSets} onChange={e=>setAddExSets(e.target.value)} style={{width:80}}><option value="2">2 sets</option><option value="3">3 sets</option><option value="4">4 sets</option><option value="5">5 sets</option></select>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={addExercise} style={{flex:1,padding:"10px",borderRadius:8,border:"none",background:C.acc,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>Add</button>
              <button onClick={()=>{setAddExForm(null);setAddExName("");}} style={{padding:"10px 16px",borderRadius:8,border:`1px solid ${C.sbdr}`,background:C.srf,color:C.dim,fontWeight:600,fontSize:13,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>)}

      </div>)}
    </div>

    {/* PR TOAST */}
    {prToast&&(<div style={{position:"fixed",top:70,left:"50%",transform:"translateX(-50%)",zIndex:99,background:"linear-gradient(135deg,#F59E0B,#D97706)",borderRadius:12,padding:"12px 20px",boxShadow:"0 8px 32px rgba(245,158,11,.4)",animation:"fadeIn 0.3s",maxWidth:340}}>
      <div style={{fontWeight:800,fontSize:14,color:"#fff",marginBottom:4}}>🏆 New Personal Record{prToast.length>1?"s":""}!</div>
      {prToast.map((pr,i)=>(<div key={i} style={{fontSize:12,color:"#fff",opacity:0.95}}>{pr.name}: {pr.weight} lbs</div>))}
    </div>)}

    {/* REST TIMER */}
    {restRunning&&restSec>0&&screen==="workout"&&(
      <div onClick={()=>{setRestRunning(false);setRestSec(0);}} style={{position:"fixed",bottom:screen==="workout"?140:80,left:"50%",transform:"translateX(-50%)",zIndex:55,background:restSec<=10?"linear-gradient(135deg,#EF4444,#DC2626)":"linear-gradient(135deg,#1E293B,#0F172A)",border:`2px solid ${restSec<=10?"#EF444460":"#5B8DEF40"}`,borderRadius:50,padding:"10px 24px",boxShadow:"0 8px 32px rgba(0,0,0,.5)",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:13,color:restSec<=10?"#fff":"#5B8DEF",fontWeight:700}}>⏳ Rest</span>
        <span style={{fontFamily:"Outfit",fontSize:22,fontWeight:800,color:"#fff"}}>{Math.floor(restSec/60)}:{(restSec%60)<10?"0":""}{restSec%60}</span>
        <span style={{fontSize:10,color:"#ffffff80"}}>tap to dismiss</span>
      </div>)}

    {/* SAVE BUTTON + DELETE SESSION */}
    {screen==="workout"&&(
      <div style={{position:"fixed",bottom:0,left:0,right:0,padding:"12px 16px 24px",background:`linear-gradient(180deg,transparent,${C.bg} 40%)`,zIndex:40}}>
        <div style={{maxWidth:600,margin:"0 auto"}}>
          <button onClick={save} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",fontWeight:700,fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"all .3s",background:saved?"linear-gradient(135deg,#16A34A,#15803D)":`linear-gradient(135deg,${C.acc},#E85D1A)`,color:"#fff",boxShadow:saved?"0 4px 24px rgba(34,197,94,.3)":"0 4px 24px rgba(255,107,44,.3)"}}>
            {saved?<><Check/> Saved{elapsed>0?" · "+fmtElapsed(elapsed):""}</>:syncing?<><span className="syncing">Syncing...</span></>:<><DBIcon s={18}/> Save Workout</>}
          </button>
          {hist[`${planId}-${phaseIdx}-${dayIdx}-${today}`]&&!delConfirm&&(
            <button onClick={()=>setDelConfirm(true)} style={{width:"100%",marginTop:6,padding:"10px",borderRadius:8,border:`1px solid #EF444425`,background:"transparent",color:"#EF4444",fontSize:12,fontWeight:600,cursor:"pointer"}}>Delete Today's Session</button>
          )}
          {delConfirm&&(
            <div style={{marginTop:6,background:"#EF444412",border:"1px solid #EF444430",borderRadius:10,padding:12,textAlign:"center"}}>
              <div style={{fontSize:12,color:"#EF4444",marginBottom:8}}>Delete all logged data for today's workout?</div>
              <div style={{display:"flex",gap:8,justifyContent:"center"}}>
                <button onClick={deleteSession} style={{padding:"8px 20px",borderRadius:8,border:"none",background:"#EF4444",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>Yes, Delete</button>
                <button onClick={()=>setDelConfirm(false)} style={{padding:"8px 20px",borderRadius:8,border:`1px solid ${C.sbdr}`,background:C.srf,color:C.dim,fontWeight:600,fontSize:12,cursor:"pointer"}}>Cancel</button>
              </div>
            </div>
          )}
        </div>
      </div>)}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
