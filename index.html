<script>
(function boot() {
  var checks = 0;
  function poll() {
    checks++;
    if (typeof firebase !== 'undefined' && firebase.initializeApp && firebase.auth && firebase.firestore) {
      var fbApp = firebase.initializeApp(window.FIREBASE_CONFIG);
      window.auth = firebase.auth();
      window.db = firebase.firestore();
      window.db.enablePersistence({synchronizeTabs:true}).catch(function(){});
      startApp();
      var sp = document.getElementById('splash');
      if (sp) { sp.style.opacity='0'; setTimeout(function(){sp.remove();},300); }
    } else if (checks < 200) {
      setTimeout(poll, 25);
    } else {
      document.getElementById('splash').innerHTML = '<div style="color:#EF4444;font-size:14px;text-align:center;padding:20px">Failed to load. Please refresh.</div>';
    }
  }
  poll();
})();

function startApp() {
var auth = window.auth;
var db = window.db;
const {
  useState,
  useEffect,
  useCallback,
  useRef,
  useMemo
} = React;

// FIREBASE DATA LAYER
const Cloud = {
  doc: (uid, name) => db.collection("users").doc(uid).collection("app").doc(name),
  save: async (uid, name, data) => {
    try {
      await Cloud.doc(uid, name).set(data);
      return true;
    } catch (e) {
      console.error("Cloud save:", e);
      return false;
    }
  },
  load: async (uid, name) => {
    try {
      const snap = await Cloud.doc(uid, name).get();
      return snap.exists ? snap.data() : null;
    } catch (e) {
      return null;
    }
  },
  listen: (uid, name, cb) => Cloud.doc(uid, name).onSnapshot(snap => {
    if (snap.exists) cb(snap.data());
  }, () => {})
};
