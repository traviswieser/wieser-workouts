const pickExs=(group,equipKeys,count=2)=>{
  const pool=EX_BY_EQUIP[group]||{};
  const buckets=equipKeys.map(k=>[...(pool[k]||[])]).filter(b=>b.length>0);
  if(buckets.length===0)return[];
  const groupOffset={"chest":0,"back":1,"shoulders":2,"biceps":0,"triceps":1,"quads":2,"hamstrings":0,"glutes":1,"core":2,"calves":0,"cardio":1}[group]||0;
  const result=[];const used=new Set();let bi=groupOffset%buckets.length;
  while(result.length<count){
    let found=false;
    for(let attempt=0;attempt<buckets.length;attempt++){
      const bucket=buckets[(bi+attempt)%buckets.length];
      const ex=bucket.find(e=>!used.has(e));
      if(ex){result.push(ex);used.add(ex);bi=(bi+attempt+1)%buckets.length;found=true;break;}
    }
    if(!found)break;
  }
  return result;
};

// PROGRESS HELPERS
const Stats={
  getDates:(hist,pid)=>{const dates=[];Object.keys(hist).forEach(k=>{if(pid&&!k.startsWith(pid+"-"))return;const p=k.split("-");const d=pid?p.slice(3).join("-"):p.slice(p.length>=6?3:3).join("-");if(d&&d.match(/^\d{4}-/)&&!dates.includes(d))dates.push(d);});return dates.sort();},
  getWeek:(hist,pid)=>{const dates=Stats.getDates(hist,pid);if(!dates.length)return 0;const first=new Date(dates[0]);const now=new Date();return Math.min(Math.floor((now-first)/(7*864e5))+1,12);},
  getTotal:(hist,pid)=>Stats.getDates(hist,pid).length,
  getSessions:(hist,pid,phi,di)=>{const pre=`${pid}-${phi}-${di}-`;const s=[];Object.entries(hist).forEach(([k,v])=>{if(k.startsWith(pre))s.push({date:k.slice(pre.length),data:v});});return s.sort((a,b)=>a.date.localeCompare(b.date));},
  getExHistory:(hist,pid,exName)=>{const pts=[];Object.entries(hist).forEach(([k,v])=>{if(pid&&!k.startsWith(pid+"-"))return;const parts=k.split("-");const date=parts.slice(3).join("-");Object.values(v).forEach(ex=>{if(ex.name===exName&&ex.sets){let bW=0,bR=0,vol=0;ex.sets.forEach(s=>{const w=parseFloat(s.weight)||0;const r=parseFloat(s.reps)||0;if(w>bW){bW=w;bR=r;}vol+=w*r;});if(bW>0)pts.push({date,weight:bW,reps:bR,volume:vol,sets:ex.sets});}});});return pts.sort((a,b)=>a.date.localeCompare(b.date));},
  getLoggedExercises:(hist,pid)=>{const names=new Set();Object.entries(hist).forEach(([k,v])=>{if(pid&&!k.startsWith(pid+"-"))return;Object.values(v).forEach(ex=>{if(ex.name&&ex.sets&&ex.sets.some(s=>parseFloat(s.weight)>0||parseFloat(s.reps)>0))names.add(ex.name);});});return Array.from(names).sort();},
  getTotalMiles:(hist,pid,exName)=>{let total=0;Object.entries(hist).forEach(([k,v])=>{if(pid&&!k.startsWith(pid+"-"))return;Object.values(v).forEach(ex=>{if(ex.name===exName&&ex.sets){ex.sets.forEach(s=>{total+=parseFloat(s.reps)||0;});}});});return Math.round(total*10)/10;},
  getPR:(hist,pid,exName)=>{let best=0;Object.entries(hist).forEach(([k,v])=>{if(pid&&!k.startsWith(pid+"-"))return;Object.values(v).forEach(ex=>{if(ex.name===exName&&ex.sets){ex.sets.forEach(s=>{const w=parseFloat(s.weight)||0;if(w>best)best=w;});}});});return best;},
  fmtDate:(d)=>new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}),
  fmtDateFull:(d)=>new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}),
  getPctChange:(pts)=>{if(pts.length<2)return null;const f=pts[0].weight,l=pts[pts.length-1].weight;return f===0?null:Math.round(((l-f)/f)*100);},
  calc1RM:(w,r)=>{if(!w||!r||r<=0)return 0;if(r===1)return w;return Math.round(w*(1+r/30));},
  getAll1RMs:(hist,pid)=>{const map={};Object.entries(hist).forEach(([k,v])=>{if(pid&&!k.startsWith(pid+"-"))return;Object.values(v).forEach(ex=>{if(!ex.name||!ex.sets||DURATION_EX.has(ex.name)||TIME_HOLD_EX.has(ex.name)||REPS_ONLY_EX.has(ex.name))return;ex.sets.forEach(s=>{const w=parseFloat(s.weight)||0;const r=parseFloat(s.reps)||0;if(w>0&&r>0){const orm=Stats.calc1RM(w,r);if(!map[ex.name]||orm>map[ex.name].orm)map[ex.name]={orm,weight:w,reps:r};}});});});return map;},
  getStreak:(hist)=>{const allDates=new Set();Object.keys(hist).forEach(k=>{const p=k.split("-");const d=p.slice(3).join("-");if(d)allDates.add(d);});if(!allDates.size)return{current:0,best:0,thisWeek:0};const sorted=[...allDates].sort().reverse();let cur=0;const today=new Date();for(let i=0;i<400;i++){const d=new Date(today);d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);if(allDates.has(ds))cur++;else if(i>0)break;}let best=0,run=0,prev=null;[...allDates].sort().forEach(d=>{const dt=new Date(d+"T12:00:00");if(prev){const diff=Math.round((dt-prev)/(864e5));if(diff<=2)run++;else run=1;}else run=1;prev=dt;if(run>best)best=run;});const weekStart=new Date(today);weekStart.setDate(weekStart.getDate()-weekStart.getDay());const ws=weekStart.toISOString().slice(0,10);const thisWeek=[...allDates].filter(d=>d>=ws).length;return{current:cur,best,thisWeek};},
  getWeeklyVolume:(hist,pid,weeks=8)=>{const data=[];const now=new Date();for(let w=weeks-1;w>=0;w--){const start=new Date(now);start.setDate(start.getDate()-start.getDay()-w*7);const end=new Date(start);end.setDate(end.getDate()+6);const ws=start.toISOString().slice(0,10);const we=end.toISOString().slice(0,10);let vol=0,sets=0,sessions=0;const dates=new Set();Object.entries(hist).forEach(([k,v])=>{if(pid&&!k.startsWith(pid+"-"))return;const d=k.split("-").slice(3).join("-");if(d>=ws&&d<=we){dates.add(d);Object.values(v).forEach(ex=>{if(ex.sets)ex.sets.forEach(s=>{const wt=parseFloat(s.weight)||0;const rp=parseFloat(s.reps)||0;if(wt>0){vol+=wt*rp;sets++;}});});}});sessions=dates.size;data.push({week:Stats.fmtDate(ws),volume:Math.round(vol),sets,sessions});}return data;},
  getMuscleVolume:(hist,pid)=>{const map={};Object.entries(hist).forEach(([k,v])=>{if(pid&&!k.startsWith(pid+"-"))return;Object.values(v).forEach(ex=>{if(!ex.name||!ex.sets)return;const grp=EX_GRP[ex.name]||"other";let sets=0;ex.sets.forEach(s=>{if((parseFloat(s.weight)||0)>0||(parseFloat(s.reps)||0)>0)sets++;});map[grp]=(map[grp]||0)+sets;});});return map;},
  getRestDayRec:(hist)=>{const allDates=new Set();Object.keys(hist).forEach(k=>{const d=k.split("-").slice(3).join("-");if(d)allDates.add(d);});const today=new Date();const last7=[];for(let i=0;i<7;i++){const d=new Date(today);d.setDate(d.getDate()-i);last7.push(d.toISOString().slice(0,10));}const recentCount=last7.filter(d=>allDates.has(d)).length;const yesterday=last7[1];const dayBefore=last7[2];const consecutive=allDates.has(yesterday)&&allDates.has(dayBefore)&&allDates.has(last7[3]);if(recentCount>=6)return{msg:"Your body needs rest! Consider taking today off.",level:"high",days:recentCount};if(consecutive)return{msg:"3+ days in a row — a rest day can boost recovery.",level:"medium",days:recentCount};if(recentCount>=4)return{msg:"Great consistency! Listen to your body.",level:"low",days:recentCount};return null;},
  getBadges:(hist)=>{const allDates=new Set();Object.keys(hist).forEach(k=>{const d=k.split("-").slice(3).join("-");if(d)allDates.add(d);});const n=allDates.size;const badges=[];if(n>=1)badges.push({icon:"🏅",name:"First Workout",desc:"Completed your first session"});if(n>=10)badges.push({icon:"🔥",name:"On Fire",desc:"10 sessions logged"});if(n>=25)badges.push({icon:"⚡",name:"Quarter Century",desc:"25 sessions logged"});if(n>=50)badges.push({icon:"💎",name:"Diamond Grinder",desc:"50 sessions logged"});if(n>=100)badges.push({icon:"🏆",name:"Century Club",desc:"100 sessions logged"});if(n>=200)badges.push({icon:"👑",name:"Legend",desc:"200 sessions logged"});const streak=Stats.getStreak(hist);if(streak.best>=7)badges.push({icon:"🔗",name:"Iron Will",desc:"7-day streak"});if(streak.best>=14)badges.push({icon:"⛓️",name:"Unbreakable",desc:"14-day streak"});if(streak.best>=30)badges.push({icon:"🌟",name:"Monthly Machine",desc:"30-day streak"});return badges;}
};

// SVG LINE CHART
function MiniChart({points,width=340,height=180,unit="lbs",c}){const C=c||DARK;
  if(!points||!points.length)return<div style={{color:C.fnt,fontSize:13,padding:20,textAlign:"center"}}>No data yet — log some workouts first!</div>;
  const pad={t:20,r:16,b:36,l:44};const w=width-pad.l-pad.r;const h=height-pad.t-pad.b;
  const weights=points.map(p=>p.weight);const minW=Math.floor(Math.min(...weights)*0.9);const maxW=Math.ceil(Math.max(...weights)*1.05);const range=maxW-minW||1;
  const x=(i)=>pad.l+(points.length===1?w/2:(i/(points.length-1))*w);
  const y=(v)=>pad.t+h-((v-minW)/range)*h;
  const gridLines=[];for(let i=0;i<=4;i++){const val=minW+(range*i/4);gridLines.push({y:y(val),label:Math.round(val)});}
  const linePath=points.map((p,i)=>`${i===0?'M':'L'}${x(i)},${y(p.weight)}`).join(' ');
  const areaPath=linePath+` L${x(points.length-1)},${pad.t+h} L${x(0)},${pad.t+h} Z`;
  return(
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{display:"block",maxWidth:"100%"}}>
      <defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#FF6B2C" stopOpacity="0.3"/><stop offset="100%" stopColor="#FF6B2C" stopOpacity="0"/></linearGradient></defs>
      {gridLines.map((g,i)=>(<g key={i}><line x1={pad.l} y1={g.y} x2={width-pad.r} y2={g.y} stroke={C.bdr} strokeWidth="1"/><text x={pad.l-6} y={g.y+4} fill={C.fnt} fontSize="10" textAnchor="end" fontFamily="DM Sans">{g.label}</text></g>))}
      {points.map((p,i)=>{const skip=Math.max(1,Math.floor(points.length/6));if(i%skip!==0&&i!==points.length-1)return null;return<text key={i} x={x(i)} y={height-6} fill={C.fnt} fontSize="9" textAnchor="middle" fontFamily="DM Sans">{Stats.fmtDate(p.date)}</text>;})}
      <path d={areaPath} fill="url(#areaGrad)"/>
      <path d={linePath} fill="none" stroke="#FF6B2C" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {points.map((p,i)=>(<g key={i}><circle cx={x(i)} cy={y(p.weight)} r="4.5" fill="#FF6B2C" stroke="#08080A" strokeWidth="2"/><text x={x(i)} y={y(p.weight)-10} fill={C.txt} fontSize="10" fontWeight="600" textAnchor="middle" fontFamily="DM Sans">{p.weight}</text></g>))}
      <text x={4} y={pad.t-6} fill={C.fnt} fontSize="9" fontFamily="DM Sans">{unit}</text>
    </svg>
  );
}

          </div>
        </div>
      </div>
    </div>

    <div style={{maxWidth:600,margin:"0 auto"}}>

    {/* ══════ CREATE PLAN ══════ */}
    {screen==="create"&&(
      <div className="fade-in" style={{padding:"16px 16px 80px"}}>

        {cpScreen==="main"&&(<>
          <div style={{fontFamily:"Outfit",fontSize:22,fontWeight:800,marginBottom:4}}>Create a Plan</div>
          <div style={{fontSize:13,color:C.dim,marginBottom:12}}>Start from a template or use AI to generate a custom plan</div>
          <div style={{background:"#5B8DEF10",border:"1px solid #5B8DEF25",borderRadius:10,padding:"10px 14px",marginBottom:20,fontSize:12,color:"#5B8DEF",lineHeight:1.5}}>💡 Want your plan permanently added to the app? Send it to <b>traviswieser@gmail.com</b> and it can be uploaded as an official plan for everyone.</div>

          <div style={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:12,padding:16,marginBottom:16}}>
            <div style={{fontSize:11,color:"#22C55E",fontWeight:700,letterSpacing:"0.5px",marginBottom:10}}>AVAILABLE EQUIPMENT</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>

            </div>
            <div style={{marginTop:8,fontSize:10,color:C.fnt}}>Select your equipment — templates and exercises adapt automatically.</div>

          <div style={{fontSize:11,color:C.acc,fontWeight:700,letterSpacing:"0.5px",marginBottom:10}}>QUICK TEMPLATES</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:24}}>
            {TEMPLATES.map(t=>(<button key={t.key} onClick={()=>{const p=t.gen(cpEquip);p._createdBy=user.uid;p._createdAt=Date.now();p._published=false;setCpDraft(p);setCpScreen("edit");}} style={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:12,padding:"16px 12px",textAlign:"center",cursor:"pointer"}}><div style={{fontSize:24,marginBottom:6}}>{t.icon}</div><div style={{fontWeight:700,fontSize:13,color:C.txt}}>{t.name}</div><div style={{fontSize:11,color:C.dim,marginTop:2}}>{t.sub}</div></button>))}
          </div>

          <div style={{fontSize:11,color:"#A78BFA",fontWeight:700,letterSpacing:"0.5px",marginBottom:10}}>AI GENERATION</div>
          <div style={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:12,padding:16,marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:700,color:C.txt,marginBottom:8}}>Describe your ideal plan</div>
            <textarea placeholder='Example: "4-day upper/lower split for intermediate lifters. Focus on strength with 5x5 compounds and hypertrophy accessories. Include 2 rest days."' value={aiPrompt} onChange={e=>setAiPrompt(e.target.value)} style={{width:"100%",minHeight:80,background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:8,padding:"10px 12px",color:C.txt,fontSize:13,outline:"none",resize:"vertical",boxSizing:"border-box",fontFamily:"inherit",lineHeight:1.5}}/>
            <button onClick={()=>generateAIPlan(aiPrompt+"\nAvailable equipment: "+cpEquip.map(k=>{const e=EQUIPMENT.find(eq=>eq.key===k);return e?e.label:k;}).join(", ")+". Only use exercises possible with this equipment.")} disabled={aiLoading||!aiPrompt.trim()} style={{width:"100%",marginTop:8,padding:"12px",borderRadius:10,border:"none",background:aiLoading?"#555":`linear-gradient(135deg,#A78BFA,#7C3AED)`,color:"#fff",fontSize:14,fontWeight:700,cursor:aiLoading?"wait":"pointer",opacity:(!aiPrompt.trim()&&!aiLoading)?0.5:1}}>{aiLoading?"Generating...":"✨ Generate with AI"}</button>
          </div>

          <div style={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:12,padding:16,marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:700,color:C.txt,marginBottom:8}}>Import an existing workout plan</div>
            <input ref={fileRef} type="file" accept="image/*,.pdf,.txt,.csv" onChange={handleFile} style={{display:"none"}}/>
            <button onClick={()=>fileRef.current?.click()} style={{width:"100%",padding:"14px",borderRadius:10,border:`2px dashed ${aiFileData?C.acc+"60":C.sbdr}`,background:aiFileData?C.acc+"08":"transparent",color:aiFileData?C.acc:C.dim,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:8,transition:"all 0.2s"}}>{aiFileData?("✅ "+aiFileName):("📷 Upload Image, PDF, or Text File")}</button>
            <textarea placeholder="Or paste your workout plan as text here. You can also add notes alongside an uploaded file." value={aiPaste} onChange={e=>setAiPaste(e.target.value)} style={{width:"100%",minHeight:70,background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:8,padding:"10px 12px",color:C.txt,fontSize:13,outline:"none",resize:"vertical",boxSizing:"border-box",fontFamily:"inherit",lineHeight:1.5}}/>
            <div style={{display:"flex",gap:8,marginTop:8}}>
              {aiFileData&&<button onClick={()=>generateWithFile()} disabled={aiLoading} style={{flex:1,padding:"12px",borderRadius:10,border:"none",background:aiLoading?"#555":`linear-gradient(135deg,#F59E0B,#D97706)`,color:"#fff",fontSize:14,fontWeight:700,cursor:aiLoading?"wait":"pointer"}}>{aiLoading?"Converting...":"📷 Convert File with AI"}</button>}
              <button onClick={()=>generateAIPlan("Convert this workout plan into the EXACT JSON format. You MUST keep every exercise name, set count, and rep scheme EXACTLY as written — do NOT substitute, rename, reorder, or add exercises. Only organize into the JSON structure:\n\n"+aiPaste)} disabled={aiLoading||!aiPaste.trim()} style={{flex:1,padding:"12px",borderRadius:10,border:"none",background:aiLoading?"#555":aiFileData?C.srf:`linear-gradient(135deg,#F59E0B,#D97706)`,color:aiFileData?C.dim:"#fff",fontSize:14,fontWeight:700,cursor:aiLoading?"wait":"pointer",opacity:(!aiPaste.trim()&&!aiLoading)?0.5:1}}>{aiLoading?"Converting...":"📋 Convert Text with AI"}</button>
            </div>
            {aiFileData&&<div style={{marginTop:6,fontSize:10,color:C.fnt}}>Supported: JPG, PNG, PDF, TXT, CSV. Images and PDFs are sent directly to the AI for visual reading.</div>}
          </div>

          {aiError&&<div style={{padding:"10px 14px",background:aiError.includes("Enter")?"#F59E0B18":"#EF444418",border:aiError.includes("Enter")?"1px solid #F59E0B30":"1px solid #EF444430",borderRadius:8,color:aiError.includes("Enter")?"#F59E0B":"#EF4444",fontSize:12,marginBottom:12}}>{aiError}</div>}

          <div style={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:12,padding:16}}>
            <div style={{fontSize:11,color:C.fnt,fontWeight:700,letterSpacing:"0.5px",marginBottom:10}}>API KEY SETTINGS</div>
            <div style={{display:"flex",gap:6,marginBottom:8}}>
              {["groq","openai","claude","gemini"].map(p=>(<button key={p} onClick={()=>setAiProvider(p)} style={{flex:1,padding:"8px",borderRadius:8,border:`1px solid ${aiProvider===p?C.acc+"60":C.sbdr}`,background:aiProvider===p?C.acc+"15":"transparent",color:aiProvider===p?C.acc:C.dim,fontSize:11,fontWeight:700,cursor:"pointer"}}>{p==="openai"?"OpenAI":p==="claude"?"Claude":p==="gemini"?"Gemini":p==="groq"?"Groq ⚡":p}</button>))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <input type="password" placeholder={aiProvider==="openai"?"sk-...":aiProvider==="claude"?"sk-ant-...":aiProvider==="groq"?"gsk_...":"AIza..."} value={aiKey} onChange={e=>setAiKey(e.target.value)} style={{flex:1,background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:8,padding:"10px 12px",color:C.txt,fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
              <button onClick={saveAIKey} style={{padding:"10px 14px",borderRadius:8,border:"none",background:C.acc,color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>Save</button>
            </div>
            <div style={{fontSize:10,color:C.fnt,marginTop:6,lineHeight:1.5}}>Your key is stored in your private Firebase data. It never touches our servers. Calls go directly from your browser to the AI provider.</div>
            <div style={{marginTop:10,padding:"10px 12px",background:C.srf,borderRadius:8,fontSize:11,color:C.dim,lineHeight:1.7}}>
              {aiProvider==="groq"&&<><b style={{color:C.txt}}>How to get a Groq key (FREE):</b><br/>1. Go to <a href="https://console.groq.com/keys" target="_blank" rel="noopener" style={{color:C.acc}}>console.groq.com/keys</a><br/>2. Sign up with Google or email (free, no credit card)<br/>3. Click "Create API Key"<br/>4. Copy the key (starts with <b>gsk_</b>) and paste it above<br/><span style={{color:"#22C55E",fontWeight:700}}>✓ Completely free. No credit card needed. No billing.</span><br/>Uses Llama 3.3 70B — a powerful open-source model with fast inference.</>}
              {aiProvider==="openai"&&<><b style={{color:C.txt}}>How to get an OpenAI key:</b><br/>1. Go to <a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener" style={{color:C.acc}}>platform.openai.com/api-keys</a><br/>2. Sign in or create an account<br/>3. Click "Create new secret key"<br/>4. Copy the key (starts with <b>sk-</b>) and paste it above<br/>Note: Requires adding a payment method. Generating a plan costs ~$0.02–0.05.</>}
              {aiProvider==="claude"&&<><b style={{color:C.txt}}>How to get a Claude key:</b><br/>1. Go to <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener" style={{color:C.acc}}>console.anthropic.com/settings/keys</a><br/>2. Sign in or create an account<br/>3. Click "Create Key"<br/>4. Copy the key (starts with <b>sk-ant-</b>) and paste it above<br/>Note: Requires adding billing credits. Generating a plan costs ~$0.02–0.05.</>}
              {aiProvider==="gemini"&&<><b style={{color:C.txt}}>How to get a Gemini key:</b><br/>1. Go to <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener" style={{color:C.acc}}>aistudio.google.com/apikey</a><br/>2. Sign in with your Google account<br/>3. Click "Create API key"<br/>4. Copy the key (starts with <b>AIza</b>) and paste it above<br/>Note: Google now requires billing for most API usage. If you get a quota error, you may need to enable billing at <a href="https://console.cloud.google.com/billing" target="_blank" rel="noopener" style={{color:C.acc}}>console.cloud.google.com/billing</a>. OpenAI is recommended as the most reliable option.</>}
            </div>
          </div>
        </>)}

        {cpScreen==="edit"&&cpDraft&&(<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontFamily:"Outfit",fontSize:20,fontWeight:800}}>Edit Plan</div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{setCpScreen("main");setCpDraft(null);}} style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${C.sbdr}`,background:C.srf,color:C.dim,fontSize:12,fontWeight:600,cursor:"pointer"}}>Cancel</button>
              <button onClick={()=>publishPlan(cpDraft)} style={{padding:"6px 16px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${C.acc},#E85D1A)`,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>Publish ✓</button>
            </div>
          </div>

          <div style={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:12,padding:16,marginBottom:12}}>
            <div style={{fontSize:10,color:C.fnt,fontWeight:700,marginBottom:6}}>PLAN NAME</div>
            <input value={cpDraft.name} onChange={e=>setCpDraft({...cpDraft,name:e.target.value})} style={{width:"100%",background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:8,padding:"10px 12px",color:C.txt,fontSize:15,fontWeight:700,outline:"none",boxSizing:"border-box",fontFamily:"inherit",marginBottom:8}}/>
            <div style={{fontSize:10,color:C.fnt,fontWeight:700,marginBottom:6}}>SUBTITLE</div>
            <input value={cpDraft.subtitle} onChange={e=>setCpDraft({...cpDraft,subtitle:e.target.value})} style={{width:"100%",background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:8,padding:"10px 12px",color:C.txt,fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
          </div>

          {cpDraft.phases?.map((ph,pi)=>(
            <div key={pi} style={{marginBottom:12}}>
              <div style={{background:`linear-gradient(135deg,${C.acc}15,${C.card})`,border:`1px solid ${C.acc}30`,borderRadius:12,padding:"12px 16px",marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                  <div style={{display:"flex",gap:4,alignItems:"center",flexShrink:0}}>
                    {pi>0&&<button onClick={()=>{const np=JSON.parse(JSON.stringify(cpDraft.phases));const tmp=np[pi];np[pi]=np[pi-1];np[pi-1]=tmp;setCpDraft({...cpDraft,phases:np});}} style={{background:"none",border:`1px solid ${C.sbdr}`,borderRadius:4,color:C.dim,cursor:"pointer",fontSize:9,padding:"2px 4px"}}>▲</button>}
                    {pi<cpDraft.phases.length-1&&<button onClick={()=>{const np=JSON.parse(JSON.stringify(cpDraft.phases));const tmp=np[pi];np[pi]=np[pi+1];np[pi+1]=tmp;setCpDraft({...cpDraft,phases:np});}} style={{background:"none",border:`1px solid ${C.sbdr}`,borderRadius:4,color:C.dim,cursor:"pointer",fontSize:9,padding:"2px 4px"}}>▼</button>}
                  </div>
                  <div style={{display:"flex",gap:4}}>
                    <button onClick={()=>{const np=JSON.parse(JSON.stringify(cpDraft.phases));const dup=JSON.parse(JSON.stringify(ph));dup.title+=" (Copy)";np.splice(pi+1,0,dup);setCpDraft({...cpDraft,phases:np});}} title="Duplicate phase" style={{background:"none",border:`1px solid #A78BFA30`,borderRadius:4,color:"#A78BFA",cursor:"pointer",fontSize:9,padding:"2px 6px"}}>⧉ Dup</button>
                    {cpDraft.phases.length>1&&<button onClick={()=>{if(confirm("Delete "+ph.title+"?")){const np=JSON.parse(JSON.stringify(cpDraft.phases));np.splice(pi,1);setCpDraft({...cpDraft,phases:np});}}} title="Delete phase" style={{background:"none",border:"1px solid #EF444430",borderRadius:4,color:"#EF4444",cursor:"pointer",fontSize:9,padding:"2px 6px"}}>🗑</button>}
                  </div>
                </div>
                <input value={ph.title} onChange={e=>{const np=[...cpDraft.phases];np[pi]={...ph,title:e.target.value};setCpDraft({...cpDraft,phases:np});}} style={{background:"transparent",border:"none",color:C.acc,fontSize:14,fontWeight:800,outline:"none",width:"100%",fontFamily:"inherit"}}/>
                <div style={{display:"flex",gap:8,marginTop:4}}>
                  <input value={ph.weeks||""} onChange={e=>{const np=[...cpDraft.phases];np[pi]={...ph,weeks:e.target.value};setCpDraft({...cpDraft,phases:np});}} placeholder="Weeks 1-4" style={{background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:6,padding:"4px 8px",color:C.dim,fontSize:11,outline:"none",width:100,fontFamily:"inherit"}}/>
                  <input value={ph.rest||""} onChange={e=>{const np=[...cpDraft.phases];np[pi]={...ph,rest:e.target.value};setCpDraft({...cpDraft,phases:np});}} placeholder="Rest: 60-90s" style={{background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:6,padding:"4px 8px",color:C.dim,fontSize:11,outline:"none",width:100,fontFamily:"inherit"}}/>
                </div>
              </div>

              {ph.days?.map((dy,di)=>(
                <div key={di} style={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:10,padding:"10px 14px",marginBottom:6,marginLeft:8}}>
                  <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"center"}}>
                    <div style={{display:"flex",flexDirection:"column",gap:0,flexShrink:0}}>
                      <button onClick={()=>{if(di===0)return;const np=JSON.parse(JSON.stringify(cpDraft.phases));const tmp=np[pi].days[di];np[pi].days[di]=np[pi].days[di-1];np[pi].days[di-1]=tmp;setCpDraft({...cpDraft,phases:np});}} style={{background:"none",border:"none",cursor:di===0?"default":"pointer",fontSize:10,color:di===0?C.bdr:C.dim,padding:0,lineHeight:1}}>▲</button>
                      <button onClick={()=>{if(di>=ph.days.length-1)return;const np=JSON.parse(JSON.stringify(cpDraft.phases));const tmp=np[pi].days[di];np[pi].days[di]=np[pi].days[di+1];np[pi].days[di+1]=tmp;setCpDraft({...cpDraft,phases:np});}} style={{background:"none",border:"none",cursor:di>=ph.days.length-1?"default":"pointer",fontSize:10,color:di>=ph.days.length-1?C.bdr:C.dim,padding:0,lineHeight:1}}>▼</button>
                    </div>
                    <input value={dy.title} onChange={e=>{const np=[...cpDraft.phases];np[pi].days[di]={...dy,title:e.target.value};setCpDraft({...cpDraft,phases:np});}} style={{background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:6,padding:"6px 10px",color:C.txt,fontSize:13,fontWeight:700,outline:"none",width:80,fontFamily:"inherit"}}/>
                    <input value={dy.sub} onChange={e=>{const np=[...cpDraft.phases];np[pi].days[di]={...dy,sub:e.target.value};setCpDraft({...cpDraft,phases:np});}} style={{flex:1,background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:6,padding:"6px 10px",color:C.dim,fontSize:12,outline:"none",fontFamily:"inherit"}}/>
                    <button onClick={()=>{const np=JSON.parse(JSON.stringify(cpDraft.phases));const dup=JSON.parse(JSON.stringify(dy));dup.title="Day "+(ph.days.length+1);dup.sub+=" (Copy)";np[pi].days.splice(di+1,0,dup);setCpDraft({...cpDraft,phases:np});}} title="Duplicate day" style={{background:"none",border:`1px solid #A78BFA30`,borderRadius:6,color:"#A78BFA",cursor:"pointer",fontSize:10,padding:"4px 6px",flexShrink:0}}>⧉</button>
                    {ph.days.length>1&&<button onClick={()=>{if(confirm("Delete "+dy.title+"?")){const np=JSON.parse(JSON.stringify(cpDraft.phases));np[pi].days.splice(di,1);setCpDraft({...cpDraft,phases:np});}}} title="Delete day" style={{background:"none",border:"1px solid #EF444430",borderRadius:6,color:"#EF4444",cursor:"pointer",fontSize:10,padding:"4px 6px",flexShrink:0}}>🗑</button>}
                  </div>
                  {dy.exercises?.map((ex,xi)=>(
                    <div key={xi} style={{display:"flex",alignItems:"center",gap:3,marginBottom:4}}>
                      <div style={{display:"flex",flexDirection:"column",gap:0,flexShrink:0}}>
                        <button onClick={()=>{if(xi===0)return;const np=JSON.parse(JSON.stringify(cpDraft.phases));const tmp=np[pi].days[di].exercises[xi];np[pi].days[di].exercises[xi]=np[pi].days[di].exercises[xi-1];np[pi].days[di].exercises[xi-1]=tmp;setCpDraft({...cpDraft,phases:np});}} style={{background:"none",border:"none",cursor:xi===0?"default":"pointer",fontSize:8,color:xi===0?C.bdr:C.dim,padding:0,lineHeight:1}}>▲</button>

12,color:C.dim,fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>📄 Report</button>

            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={addExercise} style={{flex:1,padding:"10px",borderRadius:8,border:"none",background:C.acc,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>Add</button>
              <button onClick={()=>{setAddExForm(null);setAddExName("");}} style={{padding:"10px 16px",borderRadius:8,border:`1px solid ${C.sbdr}`,background:C.srf,color:C.dim,fontWeight:600,fontSize:13,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>)}

      </div>)}
    </div>

    {/* PR TOAST */}
    {prToast&&(<div style={{position:"fixed",top:70,left:"50%",transform:"translateX(-50%)",zIndex:99,background:"linear-gradient(135deg,#F59E0B,#D97706)",borderRadius:12,padding:"12px 20px",boxShadow:"0 8px 32px rgba(245,158,11,.4)",animation:"fadeIn 0.3s",maxWidth:340}}>
      <div style={{fontWeight:800,fontSize:14,color:"#fff",marginBottom:4}}>🏆 New Personal Record{prToast.length>1?"s":""}!</div>
      {prToast.map((pr,i)=>(<div key={i} style={{fontSize:12,color:"#fff",opacity:0.95}}>{pr.name}: {pr.weight} lbs</div>))}
    </div>)}

    {/* REST TIMER */}
    {restRunning&&restSec>0&&screen==="workout"&&(
      <div onClick={()=>{setRestRunning(false);setRestSec(0);}} style={{position:"fixed",bottom:screen==="workout"?180:80,left:"50%",transform:"translateX(-50%)",zIndex:55,background:restSec<=10?"linear-gradient(135deg,#EF4444,#DC2626)":"linear-gradient(135deg,#1E293B,#0F172A)",border:`2px solid ${restSec<=10?"#EF444460":"#5B8DEF40"}`,borderRadius:50,padding:"10px 24px",boxShadow:"0 8px 32px rgba(0,0,0,.5)",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:13,color:restSec<=10?"#fff":"#5B8DEF",fontWeight:700}}>⏳ Rest</span>
        <span style={{fontFamily:"Outfit",fontSize:22,fontWeight:800,color:"#fff"}}>{Math.floor(restSec/60)}:{(restSec%60)<10?"0":""}{restSec%60}</span>
        <span style={{fontSize:10,color:"#ffffff80"}}>tap to dismiss</span>
      </div>)}

    {/* FINISH WORKOUT BUTTON */}
    {screen==="workout"&&(
      <div style={{position:"fixed",bottom:56,left:0,right:0,padding:"8px 16px 4px",background:`linear-gradient(180deg,transparent,${C.bg} 30%)`,zIndex:46}}>
        <div style={{maxWidth:600,margin:"0 auto"}}>
          <button onClick={save} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",fontWeight:700,fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"all .3s",background:saved?"linear-gradient(135deg,#16A34A,#15803D)":`linear-gradient(135deg,${C.acc},#E85D1A)`,color:"#fff",boxShadow:saved?"0 4px 24px rgba(34,197,94,.3)":"0 4px 24px rgba(255,107,44,.3)"}}>
            {saved?<><Check/> Workout Saved ✓{elapsed>0?" · "+fmtElapsed(elapsed):""}</>:syncing?<><span className="syncing">Saving...</span></>:<><Check/> Finish Workout</>}
          </button>
          {undoStack.length>0&&!saved&&(<button onClick={undo} style={{width:"100%",marginTop:4,padding:"8px",borderRadius:8,border:`1px solid ${C.sbdr}`,background:C.srf,color:C.dim,fontSize:11,fontWeight:600,cursor:"pointer"}}>↩ Undo Last Change ({undoStack.length})</button>)}
          {hist[`${planId}-${phaseIdx}-${dayIdx}-${today}`]&&!delConfirm&&(
            <button onClick={()=>setDelConfirm(true)} style={{width:"100%",marginTop:6,padding:"10px",borderRadius:8,border:`1px solid #EF444425`,background:"transparent",color:"#EF4444",fontSize:12,fontWeight:600,cursor:"pointer"}}>Delete Today's Session</button>
          )}
          {delConfirm&&(
            <div style={{marginTop:6,background:"#EF444412",border:"1px solid #EF444430",borderRadius:10,padding:12,textAlign:"center"}}>
              <div style={{fontSize:12,color:"#EF4444",marginBottom:8}}>Delete all logged data for today's workout?</div>
              <div style={{display:"flex",gap:8,justifyContent:"center"}}>
                <button onClick={()=>deleteSession()} style={{padding:"8px 20px",borderRadius:8,border:"none",background:"#EF4444",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>Yes, Delete</button>
                <button onClick={()=>setDelConfirm(false)} style={{padding:"8px 20px",borderRadius:8,border:`1px solid ${C.sbdr}`,background:C.srf,color:C.dim,fontWeight:600,fontSize:12,cursor:"pointer"}}>Cancel</button>
              </div>
            </div>
          )}
        </div>
      </div>)}
    {/* ══════ SESSION SUMMARY MODAL ══════ */}
    {sessionSummary&&(<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.8)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setSessionSummary(null)}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:20,padding:"24px",maxWidth:340,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:8}}>💪</div>
        <div style={{fontFamily:"Outfit",fontSize:20,fontWeight:800,marginBottom:4}}>Workout Complete!</div>
        <div style={{fontSize:12,color:C.dim,marginBottom:16}}>{sessionSummary.day}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
          <div style={{background:C.srf,borderRadius:12,padding:"12px"}}><div style={{fontFamily:"Outfit",fontSize:24,fontWeight:800,color:C.acc}}>{sessionSummary.volume>1000?(sessionSummary.volume/1000).toFixed(1)+"k":sessionSummary.volume}</div><div style={{fontSize:10,color:C.fnt}}>Total Volume (lbs)</div></div>
          <div style={{background:C.srf,borderRadius:12,padding:"12px"}}><div style={{fontFamily:"Outfit",fontSize:24,fontWeight:800,color:C.grn}}>{sessionSummary.sets}</div><div style={{fontSize:10,color:C.fnt}}>Sets Completed</div></div>
          <div style={{background:C.srf,borderRadius:12,padding:"12px"}}><div style={{fontFamily:"Outfit",fontSize:24,fontWeight:800,color:"#5B8DEF"}}>{sessionSummary.exercises}</div><div style={{fontSize:10,color:C.fnt}}>Exercises</div></div>
          <div style={{background:C.srf,borderRadius:12,padding:"12px"}}><div style={{fontFamily:"Outfit",fontSize:24,fontWeight:800,color:"#A78BFA"}}>{sessionSummary.duration||"<1"}m</div><div style={{fontSize:10,color:C.fnt}}>Duration</div></div>
        </div>
        {sessionSummary.prs&&sessionSummary.prs.length>0&&(<div style={{background:"#F59E0B15",border:"1px solid #F59E0B30",borderRadius:12,padding:"10px 14px",marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:"#F59E0B",marginBottom:6}}>🎉 New Personal Records!</div>
          {sessionSummary.prs.map((pr,i)=>(<div key={i} style={{fontSize:12,color:C.txt}}>{pr.name}: <b style={{color:"#F59E0B"}}>{pr.weight} lbs</b></div>))}
        </div>)}
        <button onClick={()=>setSessionSummary(null)} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:`linear-gradient(135deg,${C.acc},#E85D1A)`,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>Done</button>
      </div>
    </div>)}

    {/* UNDO TOAST */}
    {undoToast&&(<div style={{position:"fixed",top:80,left:"50%",transform:"translateX(-50%)",zIndex:90,background:"#22C55E",color:"#fff",padding:"8px 20px",borderRadius:20,fontSize:13,fontWeight:700,boxShadow:"0 4px 16px rgba(0,0,0,.3)"}}>↩ Undo successful</div>)}

    {/* OFFLINE BANNER */}
    {isOffline&&(<div style={{position:"fixed",top:0,left:0,right:0,zIndex:99,background:"#EF4444",color:"#fff",padding:"6px 16px",fontSize:12,fontWeight:700,textAlign:"center"}}>📡 You're offline — changes will sync when you reconnect</div>)}

    {/* ══════ BOTTOM NAV DOCK ══════ */}
    {user&&screen!=="login"&&(
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.card,borderTop:`1px solid ${C.bdr}`,zIndex:45,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        <div style={{display:"flex",justifyContent:"space-around",alignItems:"center",maxWidth:600,margin:"0 auto",padding:"6px 0"}}>
          {(navItems||DEFAULT_NAV).map(id=>{const opt=NAV_OPTIONS.find(o=>o.id===id);if(!opt)return null;const isActive=(id==="home"&&screen==="home")||(id==="plans"&&screen==="plans")||(id==="community"&&screen==="community")||(id==="create"&&screen==="create")||(id==="coaching"&&screen==="coaching")||(id==="leaderboard"&&screen==="leaderboard")||(id==="progress"&&screen==="progress")||(id==="chat"&&screen==="chatlist");return(
            <button key={id} onClick={()=>{setPlanMenu(false);opt.action();}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"transparent",border:"none",color:isActive?C.acc:C.fnt,cursor:"pointer",padding:"4px 8px",minWidth:0,flex:1,position:"relative"}}>
              <span style={{fontSize:18,lineHeight:1}}>{opt.icon}{id==="chat"&&chatUnread>0&&<span style={{position:"absolute",top:0,right:"calc(50% - 16px)",background:"#EF4444",color:"#fff",fontSize:8,fontWeight:800,borderRadius:8,padding:"0 4px",minWidth:12,textAlign:"center"}}>{chatUnread>9?"9+":chatUnread}</span>}</span>
              <span style={{fontSize:9,fontWeight:isActive?700:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:60}}>{opt.label}</span>
            </button>);})}
        </div>
      </div>
    )}

    {/* ══════ NAV EDIT MODAL ══════ */}
    {navEditOpen&&(<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.7)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setNavEditOpen(false)}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:16,padding:"20px",maxWidth:360,width:"100%",maxHeight:"80vh",overflowY:"auto"}}>
        <div style={{fontFamily:"Outfit",fontSize:18,fontWeight:800,marginBottom:4}}>Edit Navigation Bar</div>
        <div style={{fontSize:12,color:C.dim,marginBottom:16}}>Tap to add or remove items. Drag to reorder. Max 5 items.</div>

        <div style={{fontSize:11,fontWeight:700,color:C.fnt,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Current Navigation</div>
        {(navItems||DEFAULT_NAV).map((id,idx)=>{const opt=NAV_OPTIONS.find(o=>o.id===id);if(!opt)return null;return(
          <div key={id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:C.srf,border:`1px solid ${C.sbdr}`,borderRadius:10,marginBottom:4}}>
            <div style={{display:"flex",flexDirection:"column",gap:2}}>
              {idx>0&&<button onClick={()=>{const n=[...(navItems||DEFAULT_NAV)];[n[idx-1],n[idx]]=[n[idx],n[idx-1]];setNavItems(n);}} style={{background:"transparent",border:"none",color:C.dim,cursor:"pointer",fontSize:10,padding:0,lineHeight:1}}>▲</button>}
              {idx<(navItems||DEFAULT_NAV).length-1&&<button onClick={()=>{const n=[...(navItems||DEFAULT_NAV)];[n[idx],n[idx+1]]=[n[idx+1],n[idx]];setNavItems(n);}} style={{background:"transparent",border:"none",color:C.dim,cursor:"pointer",fontSize:10,padding:0,lineHeight:1}}>▼</button>}
            </div>
            <span style={{fontSize:18}}>{opt.icon}</span>
            <span style={{flex:1,fontSize:13,fontWeight:600,color:C.txt}}>{opt.label}</span>
            <button onClick={()=>{setNavItems((navItems||DEFAULT_NAV).filter(i=>i!==id));}} style={{padding:"4px 10px",borderRadius:6,border:"1px solid #EF444430",background:"#EF444410",color:"#EF4444",fontSize:11,fontWeight:700,cursor:"pointer"}}>Remove</button>
          </div>);})}

        {(navItems||DEFAULT_NAV).length<5&&(<>
          <div style={{fontSize:11,fontWeight:700,color:C.fnt,textTransform:"uppercase",letterSpacing:1,marginTop:16,marginBottom:8}}>Available Items</div>
          {NAV_OPTIONS.filter(o=>!(navItems||DEFAULT_NAV).includes(o.id)).map(opt=>(
            <button key={opt.id} onClick={()=>{if((navItems||DEFAULT_NAV).length<5)setNavItems([...(navItems||DEFAULT_NAV),opt.id]);}} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"10px 12px",background:"transparent",border:`1px dashed ${C.sbdr}`,borderRadius:10,marginBottom:4,cursor:"pointer",textAlign:"left"}}>
              <span style={{fontSize:18}}>{opt.icon}</span>
              <span style={{fontSize:13,fontWeight:600,color:C.dim}}>{opt.label}</span>
              <span style={{marginLeft:"auto",fontSize:11,color:C.acc,fontWeight:700}}>+ Add</span>
            </button>
          ))}
        </>)}

        <div style={{display:"flex",gap:8,marginTop:16}}>
          <button onClick={()=>{setNavItems(DEFAULT_NAV);}} style={{flex:1,padding:"12px",borderRadius:10,border:`1px solid ${C.sbdr}`,background:C.srf,color:C.dim,fontSize:13,fontWeight:600,cursor:"pointer"}}>Reset Default</button>
          <button onClick={()=>{savePrefs({navItems:navItems||DEFAULT_NAV});setNavEditOpen(false);}} style={{flex:2,padding:"12px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${C.acc},#E85D1A)`,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Save</button>
        </div>
      </div>
    </div>)}

  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
